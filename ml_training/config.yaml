# XGBoost & Ensemble Model Training Configuration
# Based on thesis: "Utilizing AI for Improved Credit Risk Assessment" (Baglarbasi, 2025)

# Data Processing
data:
  train_size: 0.70
  val_size: 0.15
  test_size: 0.15
  random_state: 42
  
  # Feature engineering
  normalization: "z_score"  # z_score or minmax
  encoding:
    categorical: "onehot"  # onehot or label
    binary: "label"
  
  # Missing value handling
  missing_values:
    strategy: "drop"  # drop or impute
    impute_method: "mean"
  
  # Outlier detection (IQR method)
  outliers:
    enabled: true
    method: "iqr"  # iqr or zscore
    threshold: 3.0  # IQR multiplier

# Feature Selection
feature_selection:
  method: "rfe"  # rfe, correlation, importance
  n_features: null  # Auto-select or specify
  correlation_threshold: 0.85
  rfe_estimator: "xgboost"
  
  # Domain knowledge prioritization
  priority_features:
    - credit_score
    - debt_to_income_ratio
    - income
    - payment_history
    - years_at_current_job

# Cross-Validation
cross_validation:
  method: "k_fold"  # k_fold or stratified_k_fold
  n_splits: 10
  stratified: true

# Performance Metrics (Classification)
metrics:
  primary: "f1"  # f1, auc_roc, accuracy, precision, recall
  secondary:
    - auc_roc
    - precision
    - recall
    - confusion_matrix
  
  # Threshold tuning optimization
  threshold_optimization:
    enabled: true
    metric: "recall"  # Optimize for recall
    min_recall: 0.75  # Minimum recall threshold
    acceptable_precision: 0.30  # Minimum acceptable precision

# Baseline Models
baseline:
  logistic_regression:
    enabled: true
    params:
      solver: "saga"  # saga for better scaling
      max_iter: 1000
      penalty: "elasticnet"
      l1_ratio: 0.5
      class_weight: {0: 1.0, 1: 12.0}
      random_state: 42
  
  decision_tree:
    enabled: true
    params:
      max_depth: 10
      min_samples_split: 20
      min_samples_leaf: 10
      class_weight: "balanced"
      random_state: 42
  
  random_forest:
    enabled: true
    params:
      n_estimators: 100
      max_depth: 15
      min_samples_split: 10
      min_samples_leaf: 5
      class_weight: "balanced"
      n_jobs: -1
      random_state: 42

# Advanced Models
models:
  xgboost:
    enabled: true
    params:
      # Tree parameters
      max_depth: 6
      learning_rate: 0.05
      n_estimators: 200
      subsample: 0.8
      colsample_bytree: 0.8
      colsample_bylevel: 0.8
      
      # Regularization
      reg_alpha: 0.1  # L1 regularization
      reg_lambda: 1.0  # L2 regularization
      
      # Imbalanced data handling
      scale_pos_weight: 1.0  # Adjust for class imbalance
      
      # Other
      objective: "binary:logistic"
      eval_metric: ["auc", "logloss"]
      random_state: 42
      n_jobs: -1
      verbose: 0
    
    # Hyperparameter tuning (GridSearchCV)
    hyperparameter_tuning:
      enabled: true
      param_grid:
        max_depth: [4, 5, 6, 7]
        learning_rate: [0.01, 0.05, 0.1]
        n_estimators: [100, 150, 200]
        subsample: [0.7, 0.8, 0.9]
      cv_folds: 5
      n_jobs: -1
  
  lightgbm:
    enabled: true
    params:
      num_leaves: 31
      learning_rate: 0.05
      n_estimators: 200
      subsample: 0.8
      colsample_bytree: 0.8
      
      # Regularization
      reg_alpha: 0.1
      reg_lambda: 1.0
      
      # Imbalanced data
      scale_pos_weight: 1.0
      
      # Other
      objective: "binary"
      metric: "auc"
      random_state: 42
      n_jobs: -1
      verbose: -1
    
    hyperparameter_tuning:
      enabled: true
      param_grid:
        num_leaves: [25, 31, 40]
        learning_rate: [0.01, 0.05, 0.1]
        n_estimators: [100, 150, 200]
      cv_folds: 5

# Ensemble Methods
ensemble:
  method: "boosting"  # boosting or stacking
  
  # Boosting (AdaBoost, Gradient Boosting)
  boosting:
    enabled: true
    base_model: "xgboost"
    n_estimators: 50
    learning_rate: 0.1
  
  # Stacking (Meta-learner approach)
  stacking:
    enabled: true
    base_estimators:
      - "logistic_regression"
      - "random_forest"
      - "xgboost"
    meta_learner: "logistic_regression"
    cv_folds: 5

# SHAP Explainability
shap:
  enabled: true
  explainer_type: "tree"  # tree, kernel, or sampling
  
  # For sampling explainer
  shap_sampling:
    background_size: 100  # Samples for background dataset
    n_samples: 2000  # Samples for explaining predictions
  
  # Feature importance
  max_features_to_plot: 20

# Training
training:
  batch_size: 32
  epochs: 100
  early_stopping:
    enabled: true
    metric: "auc"
    patience: 10
    verbose: 1
  
  # Class imbalance handling
  class_weight:
    enabled: true
    method: "balanced"  # balanced or manual
    weights: null  # If manual, specify {0: 1.0, 1: 3.0}
  
  # SMOTE (Synthetic Minority Over-sampling)
  smote:
    enabled: false  # Use if severe class imbalance
    sampling_strategy: 0.5  # Ratio of minority to majority
    random_state: 42

# Output & Artifact Management
output:
  models_dir: "./ml_models"
  artifacts_dir: "./ml_artifacts"
  
  # Model serialization
  save_format: "pickle"  # pickle or joblib
  compress: true
  
  # Metadata tracking
  track_metadata: true
  save_preprocessing: true  # Save fitted scalers, encoders
  save_feature_names: true
  save_calibration_data: true

# Logging & Monitoring
logging:
  level: "INFO"
  log_file: "./training.log"
  verbose: 2  # 0=quiet, 1=progress, 2=verbose

# Random Seeds (for reproducibility)
random_state: 42

# Dataset sources (for reference)
datasets:
  kaggle:
    - "application_train.csv"
    - "cs-training.csv"
  uci:
    - "german_credit_data.csv"